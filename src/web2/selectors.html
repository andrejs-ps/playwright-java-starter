    <meta name="description" content="">

    <!-- Mobile Specific Metas

    <!-- FONT

    <!-- CSS

<body>

<!-- Primary Page Layout
–––––––––––––––––––––––––––––––––––––––––––––––––– -->
<div class="container">
    <div class="row" style="margin-top: 10%">
        <h3>Contact Details</h3>
        <a href="index.html">Go Back</a>
        <br/><br/>
        <form id="contactForm">
            <div class="row">
                <div class="six columns">
                    <label for="nameInput">Name</label>
                    <input class="u-full-width" id="nameInput">

                    <label for="surnameInput">Surname</label>
                    <!-- my-id is not allowed and not recognized by PW-->
                    <input class="u-full-width" id="surnameInput" data-test-id="surnameInput" my-id="surnameInput">

                    <label for="emailInput">Email</label>
                    <input class="u-full-width" type="email" placeholder="your@email.com" id="emailInput">
                </div>
            </div>
            <button type="button" class="button-primary"> Submit </button>
        </form>
    </div>
</div>

<!-- End Document
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
</body>
</html>
